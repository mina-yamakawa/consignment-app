{% extends "base.html" %}

{% block content %}
<style>
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    input[type=number] {
        -moz-appearance: textfield;
    }
</style>

<div class="container mx-auto px-4 py-8 max-w-2xl">
    <div class="mb-10 border-b-4 border-slate-100 pb-8 text-center">
        <h2 class="text-4xl font-black text-slate-900 tracking-tight">月の収支を設定</h2>
        <p class="text-xl font-bold text-slate-500 mt-2">月ごとの固定収入と経費を入力します</p>
    </div>

    <div class="bg-white border-4 border-slate-200 rounded-[2.5rem] shadow-sm p-8 mb-10">
        <form method="get" class="flex flex-col sm:flex-row items-end gap-6">
            <div class="flex-1 w-full">
                <label class="block text-lg font-black text-slate-700 mb-3 ml-2">設定したい月</label>
                <input type="month" name="month" value="{{ month }}"
                    class="w-full bg-slate-50 border-4 border-slate-200 text-slate-900 text-2xl font-black rounded-2xl p-5 focus:border-indigo-600 outline-none cursor-pointer">
            </div>
            <button type="submit" 
                class="w-full sm:w-auto px-10 py-5 bg-indigo-700 hover:bg-indigo-800 text-white text-xl font-black rounded-2xl shadow-lg transition-all active:scale-95">
                表示
            </button>
        </form>
    </div>

    <div class="bg-white border-4 border-slate-200 rounded-[3rem] shadow-xl overflow-hidden">
        <form method="post" class="p-8 md:p-12 space-y-10">
            <div class="space-y-4">
                <label class="flex items-center text-2xl font-black text-slate-800 ml-2">
                    <span class="w-10 h-10 rounded-xl bg-emerald-100 text-emerald-700 flex items-center justify-center mr-4">
                        <i class="fas fa-plus"></i>
                    </span>
                    レンタル棚の収入（円）
                </label>
                <input type="number" name="rental_income" value="{{ data.rental_income if data else 0 }}"
                    class="w-full px-8 py-6 bg-slate-50 border-4 border-slate-200 text-4xl font-mono font-black text-slate-900 rounded-[1.5rem] focus:border-emerald-500 focus:bg-white outline-none appearance-none"
                    placeholder="0">
            </div>

            <div class="space-y-4">
                <label class="flex items-center text-2xl font-black text-slate-800 ml-2">
                    <span class="w-10 h-10 rounded-xl bg-rose-100 text-rose-700 flex items-center justify-center mr-4">
                        <i class="fas fa-minus"></i>
                    </span>
                    経費・光熱費など（円）
                </label>
                <input type="number" name="expense" value="{{ data.expense if data else 0 }}"
                    class="w-full px-8 py-6 bg-slate-50 border-4 border-slate-200 text-4xl font-mono font-black text-rose-600 rounded-[1.5rem] focus:border-rose-500 focus:bg-white outline-none appearance-none"
                    placeholder="0">
            </div>

            <div class="pt-6">
                <button type="submit" 
                    class="w-full py-7 bg-indigo-700 hover:bg-indigo-800 text-white text-2xl font-black rounded-[2rem] shadow-xl transition-all active:scale-95 flex items-center justify-center gap-4">
                    <i class="fas fa-save"></i>
                    この内容で保存する
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
