{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
    <div class="mb-10 flex items-center gap-5">
        <a href="/consignors" 
           class="inline-flex items-center justify-center w-11 h-11 rounded-xl bg-white border border-slate-200 text-slate-400 hover:text-indigo-600 hover:border-indigo-200 hover:shadow-sm transition-all active:scale-90 shadow-sm"
           title="一覧に戻る">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div>
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">委託者の編集</h2>
            <p class="text-slate-500 font-medium mt-1">登録済みの委託者情報を更新します <span class="text-slate-300 font-mono ml-2">#{{ consignor.id }}</span></p>
        </div>
    </div>

    <div class="space-y-12">
        <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
            <div class="h-2 bg-indigo-500 w-full"></div>
            
            <form method="POST" class="p-8 md:p-10 space-y-8">
                
                <div class="space-y-2">
                    <label for="name" class="flex items-center text-sm font-black text-slate-700 uppercase tracking-wider ml-1">
                        <i class="fas fa-user-circle mr-2 text-indigo-400"></i>
                        名前・屋号
                    </label>
                    <input type="text" name="name" id="name" value="{{ consignor.name }}" required
                        class="block w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-900 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white transition-all outline-none">
                </div>

                <div class="space-y-2">
                    <label for="sns_url" class="flex items-center text-sm font-black text-slate-700 uppercase tracking-wider ml-1">
                        <i class="fab fa-instagram mr-2 text-indigo-400"></i>
                        SNSリンク（任意）
                    </label>
                    <input type="url" name="sns_url" id="sns_url" value="{{ consignor.sns_url or '' }}" placeholder="https://instagram.com/..."
                        class="block w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-900 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white transition-all outline-none font-mono text-sm">
                </div>

                <div class="space-y-2">
                    <label for="memo" class="flex items-center text-sm font-black text-slate-700 uppercase tracking-wider ml-1">
                        <i class="fas fa-sticky-note mr-2 text-indigo-400"></i>
                        備考・メモ
                    </label>
                    <textarea name="memo" id="memo" rows="4" placeholder="連絡先や契約条件など..."
                        class="block w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-900 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white transition-all outline-none leading-relaxed">{{ consignor.memo or '' }}</textarea>
                </div>

                <div class="pt-6 flex flex-col sm:flex-row items-center justify-end gap-4 border-t border-slate-100 mt-6">
                    <a href="/consignors" class="w-full sm:w-auto text-center px-8 py-4 text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors">
                        キャンセル
                    </a>
                    <button type="submit" class="w-full sm:w-auto inline-flex items-center justify-center px-10 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-100 hover:shadow-indigo-200 transition-all active:scale-95">
                        <i class="fas fa-save mr-2"></i> 更新を保存する
                    </button>
                </div>
            </form>
        </div>

        <div class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-red-500 to-rose-600 rounded-3xl blur opacity-10 group-hover:opacity-20 transition duration-1000"></div>
            <div class="relative p-8 bg-white border border-red-100 rounded-3xl shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-red-50 flex items-center justify-center text-red-500 shrink-0">
                        <i class="fas fa-user-slash text-xl"></i>
                    </div>
                    <div>
                        <h3 class="text-red-800 font-black text-lg">この委託者を完全に削除</h3>
                        <p class="text-red-500/70 text-sm mt-1 font-medium leading-relaxed">
                            削除すると、この委託者に紐づく商品データや履歴が正しく表示されなくなる可能性があります。
                        </p>
                    </div>
                </div>
                
                <form method="POST" action="{{ url_for('delete_consignor', id=consignor.id) }}" 
                      onsubmit="return confirm('本当にこの委託者を削除しますか？\nこの操作は取り消せません。')" class="shrink-0 w-full md:w-auto">
                    <button type="submit" class="w-full px-8 py-3.5 bg-white text-red-600 font-black text-sm rounded-xl border-2 border-red-50 hover:bg-red-600 hover:text-white hover:border-red-600 transition-all shadow-sm active:scale-95">
                        削除を実行する
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
