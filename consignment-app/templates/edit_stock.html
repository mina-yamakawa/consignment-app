{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
    <div class="mb-10 flex items-center gap-5">
        <a href="{{ url_for('stock_entries') }}" 
           class="inline-flex items-center justify-center w-11 h-11 rounded-xl bg-white border border-slate-200 text-slate-400 hover:text-indigo-600 hover:border-indigo-200 hover:shadow-sm transition-all active:scale-90 shadow-sm"
           title="一覧に戻る">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div>
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">入荷記録の編集</h2>
            <p class="text-slate-500 font-medium mt-1">数量や期限などの情報を正確に修正してください</p>
        </div>
    </div>

    <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
        <div class="h-2 bg-indigo-500 w-full"></div>
        
        <form method="POST" class="p-8 md:p-10 space-y-8">
            
            <div class="space-y-2">
                <label class="flex items-center text-sm font-black text-slate-700 uppercase tracking-wider">
                    <i class="fas fa-layer-group mr-2 text-indigo-400"></i>
                    入荷数量
                </label>
                <div class="relative group">
                    <input type="number" name="quantity" value="{{ stock['quantity'] }}" min="1" step="1" required
                        class="block w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-900 text-lg font-mono focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white transition-all outline-none"
                        placeholder="0">
                    <span class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">個</span>
                </div>
            </div>

            <div class="space-y-2">
                <label class="flex items-center text-sm font-black text-slate-700 uppercase tracking-wider">
                    <i class="fas fa-calendar-check mr-2 text-indigo-400"></i>
                    入荷日
                </label>
                <input type="date" name="arrival_date" value="{{ stock['arrival_date'] }}" required
                    class="block w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-900 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white transition-all outline-none">
            </div>

            <div class="p-6 bg-amber-50/50 rounded-2xl border border-amber-100 space-y-3 transition-colors hover:bg-amber-50">
                <label class="flex items-center text-sm font-black text-amber-800 uppercase tracking-wider">
                    <i class="fas fa-hourglass-half mr-2 text-amber-500"></i>
                    賞味・消費期限（任意）
                </label>
                <input type="date" name="expiry_date" value="{{ stock['expiry_date'] }}"
                    class="block w-full px-5 py-4 bg-white border border-amber-200 rounded-xl text-slate-900 focus:ring-4 focus:ring-amber-500/20 focus:border-amber-500 transition-all outline-none">
                <p class="text-[11px] text-amber-600 font-medium">
                    <i class="fas fa-info-circle mr-1"></i> 設定すると期限アラートに表示されるようになります。
                </p>
            </div>

            <div class="pt-6 flex flex-col sm:flex-row items-center justify-end gap-4 border-t border-slate-100">
                <a href="{{ url_for('stock_entries') }}" 
                   class="w-full sm:w-auto text-center px-8 py-4 text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors">
                    キャンセル
                </a>
                <button type="submit" 
                        class="w-full sm:w-auto inline-flex items-center justify-center px-10 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-100 hover:shadow-indigo-200 transition-all active:scale-95">
                    <i class="fas fa-save mr-2"></i> 更新を反映する
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
