{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
    <div class="mb-10 flex items-center gap-6">
        <a href="{{ url_for('sales') }}" 
           class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-white border-4 border-slate-200 text-slate-400 hover:text-indigo-700 hover:border-indigo-700 transition-all shadow-sm active:scale-90"
           title="一覧に戻る">
            <i class="fas fa-arrow-left text-xl"></i>
        </a>
        <div>
            <h2 class="text-4xl font-black text-slate-900 tracking-tight">売上を登録する</h2>
            <p class="text-xl font-bold text-slate-500 mt-2">売れた商品と個数を確認して入力してください</p>
        </div>
    </div>

    <div class="bg-white border-4 border-slate-200 rounded-[3rem] shadow-xl overflow-hidden">
        <div class="h-3 bg-indigo-600 w-full"></div>
        
        <form method="POST" class="p-8 md:p-12 space-y-10">
            
            <div class="space-y-3">
                <label class="block text-xl font-black text-slate-700 ml-2">
                    <i class="fas fa-tag mr-2 text-indigo-500"></i>売れた商品
                </label>
                <div class="relative">
                    <select name="product_id" required
                        class="block w-full px-6 py-5 bg-slate-50 border-4 border-slate-200 rounded-2xl text-2xl font-black text-slate-900 focus:border-indigo-600 focus:bg-white transition-all appearance-none cursor-pointer outline-none">
                        <option value="" disabled selected>-- ここを押して商品を選択 --</option>
                        {% for p in products %}
                            <option value="{{ p['id'] }}">{{ p['name'] }}</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-6 text-slate-400">
                        <i class="fas fa-chevron-down text-xl"></i>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-3">
                    <label class="block text-xl font-black text-slate-700 ml-2">
                        <i class="fas fa-shopping-basket mr-2 text-indigo-500"></i>売れた個数
                    </label>
                    <div class="relative group">
                        <input type="number" name="quantity" min="1" step="1" required placeholder="1"
                            class="block w-full px-6 py-5 bg-slate-50 border-4 border-slate-200 rounded-2xl text-3xl font-mono font-black text-slate-900 focus:border-indigo-600 focus:bg-white transition-all outline-none">
                        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-xl font-black text-slate-400">個</span>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="block text-xl font-black text-slate-700 ml-2">
                        <i class="fas fa-yen-sign mr-2 text-indigo-500"></i>金額（手入力）
                    </label>
                    <div class="relative">
                        <input type="number" name="amount" placeholder="自動計算"
                            class="block w-full px-6 py-5 bg-slate-50 border-4 border-slate-200 rounded-2xl text-3xl font-mono font-black text-slate-900 focus:border-indigo-600 focus:bg-white transition-all outline-none">
                        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-xl font-black text-slate-400">円</span>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <label class="block text-xl font-black text-slate-700 ml-2">
                    <i class="fas fa-calendar-check mr-2 text-indigo-500"></i>販売した日
                </label>
                <input type="date" name="sale_date" id="sale_date" required
                    class="block w-full px-6 py-5 bg-slate-50 border-4 border-slate-200 rounded-2xl text-2xl font-black text-slate-900 focus:border-indigo-600 focus:bg-white transition-all outline-none">
            </div>

            <div class="pt-10 flex flex-col sm:flex-row items-center justify-end gap-6 border-t-4 border-slate-50 mt-8">
                <a href="{{ url_for('sales') }}" 
                   class="w-full sm:w-auto text-center px-10 py-5 text-xl font-black text-slate-400 hover:text-slate-600 transition-colors">
                    やめる
                </a>
                <button type="submit" 
                        class="w-full sm:w-auto inline-flex items-center justify-center px-12 py-6 bg-indigo-700 hover:bg-indigo-800 text-white text-2xl font-black rounded-[1.5rem] shadow-xl shadow-indigo-100 transition-all active:scale-95">
                    <i class="fas fa-cart-arrow-down mr-3"></i> 売上を確定する
                </button>
            </div>

        </form>
    </div>
</div>

<script>
    window.addEventListener('DOMContentLoaded', (event) => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('sale_date').value = today;
    });
</script>

{% endblock %}
