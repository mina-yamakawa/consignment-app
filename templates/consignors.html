{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-6xl">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10 border-b-4 border-slate-100 pb-8">
        <div>
            <h2 class="text-4xl font-black text-slate-900 tracking-tight">委託者の一覧</h2>
            <p class="text-xl font-bold text-slate-500 mt-2">商品の作り手（パートナー）の情報を管理します</p>
        </div>
        <a href="/consignors/add" 
           class="inline-flex items-center justify-center px-8 py-4 bg-indigo-700 hover:bg-indigo-800 text-white text-xl font-black rounded-2xl shadow-lg transition-all active:scale-95">
            <i class="fas fa-plus-circle mr-3"></i> 新しく登録する
        </a>
    </div>

    <div class="bg-white border-4 border-slate-200 rounded-[2rem] shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b-4 border-slate-100">
                    <tr>
                        <th class="px-8 py-5 text-lg font-black text-slate-600 uppercase tracking-wider">お名前・屋号</th>
                        <th class="px-8 py-5 text-lg font-black text-slate-600 uppercase tracking-wider text-center">SNS（連絡先）</th>
                        <th class="px-8 py-5 text-lg font-black text-slate-600 uppercase tracking-wider">備考・メモ</th>
                        <th class="px-8 py-5 text-lg font-black text-slate-600 uppercase tracking-wider text-right"></th>
                    </tr>
                </thead>
                <tbody class="divide-y-4 divide-slate-50">
                    {% for c in consignors %}
                    <tr class="hover:bg-indigo-50/50 transition-colors group">
                        
                        <td class="px-8 py-6">
                            <div class="text-2xl font-black text-slate-900">{{ c.name }}</div>
                        </td>

                        <td class="px-8 py-6 text-center">
                            {% if c.sns_url %}
                                <a href="{{ c.sns_url }}" target="_blank" 
                                   class="inline-flex items-center px-6 py-2 rounded-xl text-lg font-bold bg-white text-blue-600 border-2 border-blue-200 hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                                    <i class="fab fa-instagram mr-2"></i> Instagramを見る
                                </a>
                            {% else %}
                                <span class="text-slate-300 font-bold">設定なし</span>
                            {% endif %}
                        </td>

                        <td class="px-8 py-6">
                            <div class="text-lg font-bold text-slate-600 max-w-md leading-relaxed">
                                {{ c.memo or "-" }}
                            </div>
                        </td>

                        <td class="px-8 py-6 text-right">
                            <a href="{{ url_for('edit_consignor', id=c.id) }}" 
                               class="inline-flex items-center px-8 py-3 text-lg font-black text-indigo-700 bg-indigo-50 hover:bg-indigo-600 hover:text-white rounded-xl transition-all border-2 border-indigo-100 hover:border-indigo-600 shadow-sm">
                                <i class="fas fa-edit mr-2"></i> 情報を修正
                            </a>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="px-8 py-24 text-center">
                            <i class="fas fa-users text-6xl text-slate-200 mb-4 block"></i>
                            <p class="text-2xl font-black text-slate-400">登録されている委託者がいません</p>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
