{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
    <div class="mb-10 flex items-center gap-6">
        <a href="{{ url_for('products') }}" 
           class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-white border-4 border-slate-200 text-slate-400 hover:text-indigo-700 hover:border-indigo-700 transition-all shadow-sm active:scale-90">
            <i class="fas fa-arrow-left text-xl"></i>
        </a>
        <div>
            <h2 class="text-4xl font-black text-slate-900 tracking-tight">新しい商品を追加</h2>
            <p class="text-xl font-bold text-slate-500 mt-2">商品の名前、販売形式を入力してください</p>
        </div>
    </div>

    <div class="bg-white border-4 border-slate-200 rounded-[3rem] shadow-xl overflow-hidden">
        <div class="h-3 bg-indigo-600 w-full"></div>
        
        <form method="POST" class="p-8 md:p-12 space-y-10">
            
            <div class="space-y-3">
                <label class="block text-xl font-black text-slate-700 ml-2">
                    <i class="fas fa-pen-nib mr-2 text-indigo-500"></i>商品名
                </label>
                <input type="text" name="name" required placeholder="例：手作り小物"
                    class="block w-full px-6 py-5 bg-slate-50 border-4 border-slate-200 rounded-2xl text-2xl font-black text-slate-900 focus:border-indigo-600 focus:bg-white transition-all outline-none">
            </div>

            <div class="space-y-3">
                <label class="block text-xl font-black text-slate-700 ml-2">
                    <i class="fas fa-user-circle mr-2 text-indigo-500"></i>委託者（作り手）
                </label>
                <div class="relative">
                    <select name="consignor_id" required
                        class="block w-full px-6 py-5 bg-slate-50 border-4 border-slate-200 rounded-2xl text-2xl font-black text-slate-900 focus:border-indigo-600 focus:bg-white transition-all appearance-none cursor-pointer outline-none">
                        <option value="" disabled selected>選択してください</option>
                        {% for c in consignors %}
                            <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-6 text-slate-400">
                        <i class="fas fa-chevron-down text-xl"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <label class="block text-xl font-black text-slate-700 ml-2">
                    <i class="fas fa-handshake mr-2 text-indigo-500"></i>販売の形式
                </label>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <label class="relative flex flex-col p-6 border-4 rounded-2xl cursor-pointer transition-all hover:bg-slate-50 border-slate-200 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-50">
                        <input type="radio" name="category" value="buy" onclick="toggleForm()" required class="sr-only">
                        <span class="text-2xl font-black text-slate-800">買い切り</span>
                        <span class="text-base font-bold text-slate-500 mt-1">店側で在庫を買い取る</span>
                    </label>

                    <label class="relative flex flex-col p-6 border-4 rounded-2xl cursor-pointer transition-all hover:bg-slate-50 border-slate-200 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-50">
                        <input type="radio" name="category" value="fee" onclick="toggleForm()" class="sr-only">
                        <span class="text-2xl font-black text-slate-800">手数料</span>
                        <span class="text-base font-bold text-slate-500 mt-1">売れた時に手数料を頂く</span>
                    </label>
                </div>
            </div>

            <div class="space-y-3">
                <label class="block text-xl font-black text-slate-700 ml-2">
                    <i class="fas fa-yen-sign mr-2 text-indigo-500"></i>販売価格
                </label>
                <div class="relative group">
                    <input type="number" name="price" id="price_input" required placeholder="0"
                        class="block w-full px-6 py-5 bg-slate-50 border-4 border-slate-200 rounded-2xl text-3xl font-mono font-black text-slate-900 focus:border-indigo-600 focus:bg-white transition-all outline-none">
                    <span class="absolute right-6 top-1/2 -translate-y-1/2 text-xl font-black text-slate-400">円</span>
                </div>
                <p id="price_help" class="text-lg font-bold text-slate-400 ml-2 hidden">※空欄でも登録できます（売上入力時に金額を決めます）</p>
            </div>

            <div id="buy_fields" class="hidden">
                <div class="p-8 bg-indigo-50 rounded-[2rem] border-4 border-indigo-200 space-y-3">
                    <label class="block text-xl font-black text-indigo-900 ml-2">仕入れ価格（原価）</label>
                    <div class="relative">
                        <input type="number" name="cost_price" placeholder="0"
                            class="block w-full px-6 py-5 bg-white border-4 border-indigo-200 rounded-2xl text-3xl font-mono font-black text-slate-900 focus:border-indigo-600 outline-none">
                        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-xl font-black text-indigo-400">円</span>
                    </div>
                </div>
            </div>

            <div id="fee_fields" class="hidden space-y-6">
                <div class="p-8 bg-indigo-50 rounded-[2rem] border-4 border-indigo-200 space-y-6">
                    <div class="space-y-3">
                        <label class="block text-xl font-black text-indigo-900 ml-2">手数料率（0.1 = 10%）</label>
                        <input type="number" step="0.01" name="fee_rate" placeholder="0.1"
                            class="block w-full px-6 py-5 bg-white border-4 border-indigo-200 rounded-2xl text-3xl font-mono font-black text-slate-900 focus:border-indigo-600 outline-none">
                    </div>
                    <div class="space-y-3">
                        <label class="block text-xl font-black text-indigo-900 ml-2">手数料の説明</label>
                        <input type="text" name="fee_description" placeholder="例：一律10%の手数料"
                            class="block w-full px-6 py-5 bg-white border-4 border-indigo-200 rounded-2xl text-xl font-bold text-slate-900 focus:border-indigo-600 outline-none">
                    </div>
                </div>
            </div>

            <div class="pt-10 flex flex-col sm:flex-row items-center justify-end gap-6 border-t-4 border-slate-50 mt-8">
                <a href="{{ url_for('products') }}" 
                   class="w-full sm:w-auto text-center px-10 py-5 text-xl font-black text-slate-400 hover:text-slate-600 transition-colors">
                    やめる
                </a>
                <button type="submit" 
                        class="w-full sm:w-auto inline-flex items-center justify-center px-16 py-6 bg-indigo-700 hover:bg-indigo-800 text-white text-2xl font-black rounded-[1.5rem] shadow-xl transition-all active:scale-95">
                    商品を登録する
                </button>
            </div>

        </form>
    </div>
</div>

<script>
function toggleForm() {
    const categoryEl = document.querySelector('input[name="category"]:checked');
    if (!categoryEl) return;

    const category = categoryEl.value;
    const buyFields = document.getElementById("buy_fields");
    const feeFields = document.getElementById("fee_fields");
    const priceInput = document.getElementById("price_input");
    const priceHelp = document.getElementById("price_help");

    if (category === "buy") {
        buyFields.classList.remove("hidden");
        feeFields.classList.add("hidden");
        priceInput.required = true;
        priceInput.placeholder = "0";
        priceHelp.classList.add("hidden");
    } else {
        buyFields.classList.add("hidden");
        feeFields.classList.remove("hidden");
        priceInput.required = false;
        priceInput.placeholder = "売上入力時に決定";
        priceHelp.classList.remove("hidden");
    }
}
</script>
{% endblock %}
